<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Manifold Folding Analysis - Layer Composition</title>
    <style>
        :root { --bg: #f8f9fa; --panel: #ffffff; --primary: #1a73e8; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); font-size: 1.6em; margin-bottom: 30px; }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        section { background: var(--panel); border-radius: 14px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { font-size: 1.1em; margin-top: 0; margin-bottom: 15px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        canvas { background: #fff; border: 1px solid #f0f0f0; border-radius: 8px; width: 100%; height: 240px; }
        .full-width { grid-column: 1 / span 2; }
        .full-width canvas { height: 350px; }

        .controls { display: flex; gap: 15px; margin-top: 15px; background: #fdfdfd; padding: 10px; border-radius: 8px; }
        .control-item { flex: 1; }
        label { display: block; font-size: 11px; margin-bottom: 5px; font-weight: bold; color: #888; text-transform: uppercase; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--primary); }

        .legend { font-size: 13px; color: #666; line-height: 1.6; margin-top: 15px; padding: 10px; background: #f1f3f4; border-radius: 6px; }
        .color-box { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <h1>심층 신경망: 레이어 합성과 매니폴드 접힘</h1>

    <div class="grid-layout">
        <!-- Layer 1 -->
        <section>
            <h2>Layer 1: f₁(x) - 입력 공간 분할</h2>
            <canvas id="canvas1"></canvas>
            <div class="controls">
                <div class="control-item"><label>Bend 1:</label><input type="range" id="l1-p1" min="-2" max="2" step="0.1" value="1.6"></div>
                <div class="control-item"><label>Bend 2:</label><input type="range" id="l1-p2" min="-2" max="2" step="0.1" value="-1.6"></div>
            </div>
            <div class="legend">
                배경색은 <b>입력 공간(x)</b>의 구간을 의미합니다.
            </div>
        </section>

        <!-- Layer 2 -->
        <section>
            <h2>Layer 2: f₂(z) - 활성화/압축 패턴</h2>
            <canvas id="canvas2"></canvas>
            <div class="controls">
                <div class="control-item"><label>Bend 1:</label><input type="range" id="l2-p1" min="-2" max="2" step="0.1" value="-1.6"></div>
                <div class="control-item"><label>Bend 2:</label><input type="range" id="l2-p2" min="-2" max="2" step="0.1" value="1.6"></div>
            </div>
            <div class="legend">
                선 색상은 <b>출력 신호(z)</b>가 처리되는 구간을 의미합니다.
            </div>
        </section>

        <!-- Composition -->
        <section class="full-width">
            <h2>합성 결과: F(x) = f₂(f₁(x)) - 구간의 지수적 폭발</h2>
            <canvas id="canvas3"></canvas>
            <div class="legend">
                - 배경색: Layer 1의 입력 구간 유지 <br>
                - <b>선 색상</b>: Layer 1의 출력이 Layer 2의 어느 구간(금/천/보)에 도달했는지 표시 <br>
                - 검은 점선: Layer 1의 꺾임 지점 (Fold Boundary)
            </div>
        </section>
    </div>
</div>

<script>
/** 색상 정의 **/
// Layer 1 배경색 (입력 영역 x 기반)
const l1BgColors = ['#e3f2fd', '#fff1f0', '#e8f5e9']; 
// Layer 2 선 색상 (입력 영역 z 기반)
const l2LineColors = ['#ffab00', '#00b8d4', '#aa00ff']; 

const ctx1 = document.getElementById('canvas1').getContext('2d');
const ctx2 = document.getElementById('canvas2').getContext('2d');
const ctx3 = document.getElementById('canvas3').getContext('2d');

/** 꺾임 지점 설정 **/
const BEND_L = -0.7;
const BEND_R = 0.7;

function getFunction(y1, y2) {
    const points = [
        {x: -2, y: -y1}, {x: BEND_L, y: y1}, {x: BEND_R, y: y2}, {x: 2, y: -y2}
    ];
    return (val) => {
        if (val <= points[0].x) return points[0].y;
        if (val >= points[3].x) return points[3].y;
        for (let i = 0; i < 3; i++) {
            if (val >= points[i].x && val <= points[i+1].x) {
                const ratio = (val - points[i].x) / (points[i+1].x - points[i].x);
                return points[i].y + ratio * (points[i+1].y - points[i].y);
            }
        }
        return 0;
    };
}

function getIdx(val) {
    if (val < BEND_L) return 0;
    if (val < BEND_R) return 1;
    return 2;
}

function draw() {
    const l1f = getFunction(parseFloat(document.getElementById('l1-p1').value), parseFloat(document.getElementById('l1-p2').value));
    const l2f = getFunction(parseFloat(document.getElementById('l2-p1').value), parseFloat(document.getElementById('l2-p2').value));

    renderL1(ctx1, l1f);
    renderL2(ctx2, l2f);
    renderL3(ctx3, l1f, l2f);
}

function setupCanvas(ctx) {
    const w = ctx.canvas.width = ctx.canvas.offsetWidth * 2;
    const h = ctx.canvas.height = ctx.canvas.offsetHeight * 2;
    const scaleX = w / 4.5;
    const scaleY = h / 5;
    ctx.clearRect(0, 0, w, h);
    
    // 축 그리기
    ctx.strokeStyle = "#eee"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();
    
    return { w, h, scaleX, scaleY };
}

function toScreen(x, y, w, h, sx, sy) {
    return { x: w/2 + x * sx, y: h/2 - y * sy };
}

// 1번 그래프: 배경색(L1구간), 선색(고정 블루)
function renderL1(ctx, fn) {
    const { w, h, scaleX, scaleY } = setupCanvas(ctx);
    
    // 배경색 채우기
    const bounds = [-2.5, BEND_L, BEND_R, 2.5];
    for(let i=0; i<3; i++) {
        ctx.fillStyle = l1BgColors[i];
        const p1 = toScreen(bounds[i], 0, w, h, scaleX, scaleY);
        const p2 = toScreen(bounds[i+1], 0, w, h, scaleX, scaleY);
        ctx.fillRect(p1.x, 0, p2.x - p1.x, h);
    }

    // 선 그리기
    ctx.strokeStyle = "#1a73e8"; ctx.lineWidth = 6; ctx.lineJoin = "round";
    ctx.beginPath();
    for(let x = -2; x <= 2.01; x += 0.01) {
        const p = toScreen(x, fn(x), w, h, scaleX, scaleY);
        if(x === -2) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
}

// 2번 그래프: 배경색(흰색), 선색(L2구간 색상)
function renderL2(ctx, fn) {
    const { w, h, scaleX, scaleY } = setupCanvas(ctx);

    for(let x = -2; x <= 2.01; x += 0.01) {
        const y = fn(x);
        const p = toScreen(x, y, w, h, scaleX, scaleY);
        const prevP = toScreen(x-0.01, fn(x-0.01), w, h, scaleX, scaleY);
        
        ctx.strokeStyle = l2LineColors[getIdx(x)];
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(prevP.x, prevP.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
    }
}

// 3번 그래프: 배경색(L1 유지), 선색(L2 매핑)
function renderL3(ctx, f1, f2) {
    const { w, h, scaleX, scaleY } = setupCanvas(ctx);
    const sy = h / 8; // 합성함수는 진폭이 커서 별도 스케일

    // 배경색 (Layer 1 기반)
    const bounds = [-2.5, BEND_L, BEND_R, 2.5];
    for(let i=0; i<3; i++) {
        ctx.fillStyle = l1BgColors[i];
        const p1 = toScreen(bounds[i], 0, w, h, scaleX, sy);
        const p2 = toScreen(bounds[i+1], 0, w, h, scaleX, sy);
        ctx.fillRect(p1.x, 0, p2.x - p1.x, h);
    }

    // 세로 점선 (L1 경계)
    ctx.setLineDash([10, 10]); ctx.strokeStyle = "#bbb"; ctx.lineWidth = 2;
    [BEND_L, BEND_R].forEach(b => {
        const p = toScreen(b, 0, w, h, scaleX, sy);
        ctx.beginPath(); ctx.moveTo(p.x, 0); ctx.lineTo(p.x, h); ctx.stroke();
    });
    ctx.setLineDash([]);

    // 합성선 그리기
    for(let x = -2; x <= 2.01; x += 0.005) {
        const z = f1(x); // L1의 출력
        const y = f2(z); // L2의 출력
        const p = toScreen(x, y, w, h, scaleX, sy);
        const prevZ = f1(x-0.005);
        const prevY = f2(prevZ);
        const prevP = toScreen(x-0.005, prevY, w, h, scaleX, sy);

        // 선 색상은 Layer 2의 색상을 따름 (z값 기준)
        ctx.strokeStyle = l2LineColors[getIdx(z)];
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(prevP.x, prevP.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
    }
}

document.querySelectorAll('input').forEach(i => i.addEventListener('input', draw));
window.onload = draw;
</script>
</body>
</html>
